    <style type="text/tailwindcss">
        @layer utilities {
            /* 安全区域 */
            .safe-area-inset-bottom {
                padding-bottom: env(safe-area-inset-bottom);
            }
            
            /* 导航栏样式 */
            .nav-item-active {
                color: theme('colors.boc-red');
            }
            .nav-item-inactive {
                color: theme('colors.boc-text-secondary');
            }
            .nav-item {
                position: relative;
                transition: all 0.3s ease;
            }
            .nav-item:not(:last-child)::after {
                content: '';
                position: absolute;
                right: 0;
                top: 20%;
                bottom: 20%;
                width: 1px;
                background-color: rgba(0, 0, 0, 0.05);
            }
            .nav-item:active {
                transform: scale(0.95);
            }
            
            /* 渐变文字效果 */
            .breathing-gradient {
                background: linear-gradient(90deg, #d7000f, #ffcc00, #000000);
                background-size: 200% 200%;
                animation: breathing 3s ease-in-out infinite;
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            @keyframes breathing {
                0% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
                100% {
                    background-position: 0% 50%;
                }
            }
            
            /* 滚动文字动画 */
            @keyframes marquee {
                0% {
                    transform: translateX(100%);
                }
                100% {
                    transform: translateX(-100%);
                }
            }
            .animate-marquee {
                animation: marquee 20s linear infinite;
            }
            
            /* 小球循环动画 */
            @keyframes balls-loop {
                0% {
                    transform: translateX(100%);
                }
                100% {
                    transform: translateX(-50%);
                }
            }
            .animate-balls-loop {
                animation: balls-loop 15s linear infinite;
            }
            
            /* 玻璃态效果 */
            .glass-effect {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            }
            
            /* 渐变按钮效果 */
            .gradient-button {
                position: relative;
                overflow: hidden;
                z-index: 1;
            }
            .gradient-button::before {
                content: '';
                position: absolute;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: linear-gradient(
                    to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.3) 50%,
                    rgba(255, 255, 255, 0) 100%
                );
                transform: rotate(30deg);
                animation: shine 3s infinite;
                z-index: -1;
            }
            @keyframes shine {
                0% {
                    transform: translateX(-100%) rotate(30deg);
                }
                100% {
                    transform: translateX(100%) rotate(30deg);
                }
            }
            
            /* 页面过渡动画 */
            .page-enter {
                animation: pageEnter 0.3s ease-out forwards;
            }
            .page-exit {
                animation: pageExit 0.3s ease-in forwards;
            }
            @keyframes pageEnter {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes pageExit {
                from {
                    opacity: 1;
                    transform: translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateY(-10px);
                }
            }
            
            /* 卡片悬停效果 */
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
            
            /* 进度条动画 */
            .progress-animate {
                transition: width 1.5s ease-out;
            }
            
            /* 微交互动画 */
            .micro-interaction:active {
                transform: scale(0.98);
                transition: transform 0.1s ease;
            }
            
            /* 加载动画 */
            .loading-pulse {
                animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
            @keyframes pulse {
                0%, 100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }
            
            /* 柔和缩放动画 */
            @keyframes gentle-zoom {
                0%, 100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.05);
                }
            }
            .animate-gentle-zoom {
                animation: gentle-zoom 8s ease-in-out infinite;
            }
            
            /* 阴影效果 */
            .shadow-soft {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);

            .shadow-strong {
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
        }

        // 当前活动页面
        let currentPage = 'home';
        
        // 获取DOM元素
        const contentElement = document.getElementById('content');
        const navItems = document.querySelectorAll('.nav-item');
        
        // 初始化页面
        function initApp() {
            // 加载初始页面
            loadPage(currentPage);
            
            // 添加导航点击事件
            navItems.forEach(item => {
                item.addEventListener('click', function() {
                    const targetPage = this.getAttribute('data-target');
                    if (targetPage !== currentPage) {
                        currentPage = targetPage;
                        loadPage(currentPage);
                        updateNavActiveState();
                    }
                });
            });
        }
        
        // 加载页面内容
        function loadPage(page) {
            if (pageTemplates[page]) {
                contentElement.innerHTML = pageTemplates[page];
                
                // 根据页面设置不同的背景颜色
                switch(page) {
                    case 'home':
                    case 'credit-card':
                        document.body.style.background = 'linear-gradient(to bottom, #e9d5ff, #c084fc)';
                        break;
                    case 'wealth':
                    case 'my':
                        document.body.style.background = 'linear-gradient(to bottom, #bfdbfe, #3b82f6)';
                        break;
                }
            } else {
                contentElement.innerHTML = `
                    <div class="p-4">
                        <h1 class="text-xl font-bold mb-4">页面不存在</h1>
                        <p class="text-boc-text-secondary">请检查页面名称是否正确。</p>
                    </div>
                `;
            }
        }
        
        // 更新导航栏活动状态
        function updateNavActiveState() {
            navItems.forEach(item => {
                const targetPage = item.getAttribute('data-target');
                if (targetPage === currentPage) {
                    item.classList.remove('nav-item-inactive');
                    item.classList.add('nav-item-active');
                } else {
                    item.classList.remove('nav-item-active');
                    item.classList.add('nav-item-inactive');
                }
            });
        }
        
        // 页面加载完成后初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            initApp();
            

            
            // 添加返回按钮事件监听
            document.addEventListener('click', function(e) {
                if (e.target && e.target.id === 'backToChannel') {
                    currentPage = 'my';
                    loadPage(currentPage);
                }
            });
        });
    </script>
